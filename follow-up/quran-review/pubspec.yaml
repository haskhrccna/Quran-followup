name: quran_review
description: Education Management App for Quran memorization monitoring
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  intl: ^0.20.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  audioplayers: ^5.2.1
  syncfusion_flutter_pdf: ^28.2.7
  syncfusion_flutter_pdfviewer: ^28.2.7
  file_picker: ^6.1.1
  image_picker: ^1.0.7
  flutter_local_notifications: ^16.3.0
  share_plus: ^7.2.1
  uuid: ^4.3.1
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/