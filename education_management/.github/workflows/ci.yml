name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: education_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check "packages/server/src/**/*.ts"

      - name: Type check
        run: npm exec --workspace=@quran-review/server -- tsc --noEmit

      - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

      - name: Prisma migrate
        run: npm exec --workspace=@quran-review/server -- prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/education_test?schema=public

      - name: Run tests
        run: npm test --workspace=@quran-review/server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/education_test?schema=public
          JWT_SECRET: test-secret-key-for-ci-only

      - name: Audit dependencies
        run: npm audit --audit-level=high

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quran_review_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm exec --workspace=@quran-review/server -- prisma generate

      - name: Integration tests
        run: npm exec --workspace=@quran-review/server -- jest -c jest.integration.config.js --runInBand
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/quran_review_test

  mobile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm exec --workspace=mobile -- tsc --noEmit
