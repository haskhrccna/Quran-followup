name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/server

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: education_test
        options: >-
           --health-cmd pg_isready
           --health-interval 10s
           --health-timeout 5s
           --health-retries 5
        ports:
           - 5432:5432

    steps:
       - uses: actions/checkout@v4

       - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

       - name: Install dependencies
        run: npm ci

       - name: Lint (prettier check)
        run: npx prettier --check "src/**/*.ts"

       - name: Type check
        run: npx tsc --noEmit

       - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

       - name: Prisma migrate (test)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/education_test?schema=public

       - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/education_test?schema=public
          JWT_SECRET: test-secret-key-for-ci-only

       - name: Audit dependencies
        run: npm audit --audit-level=high

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
       - uses: actions/checkout@v4

       - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

       - name: Install dependencies
        run: npm ci

       - name: Type check
        run: npx tsc --noEmit
